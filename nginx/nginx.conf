worker_processes auto;

events {
    worker_connections 4096; # Тримаємо багато одночасних з'єднань
}

http {
    # =========================================================================
    # 1. Ініціалізація спільної пам'яті (Shared Memory)
    # Це надшвидкий кеш всередині Nginx. Сюди ми будемо складати дані з Redis.
    # =========================================================================
    lua_shared_dict balancer_state 10m;

    # =========================================================================
    # 2. Background Worker (Control Plane Integrator)
    # Цей скрипт запускається у фоні і кожну секунду синхронізує кеш із Redis.
    # Він НЕ блокує обробку запитів користувачів.
    # =========================================================================
    init_worker_by_lua_block {
        local redis = require "resty.redis"
        local delay = 1  -- Інтервал оновлення в секундах

        local function fetch_weights_from_redis(premature)
            if premature then return end

            local red = redis:new()
            red:set_timeouts(1000, 1000, 1000) -- Таймаути (ms)

            -- Підключаємося до Redis через Docker DNS
            local ok, err = red:connect("redis", 6379)
            if not ok then
                ngx.log(ngx.ERR, "Failed to connect to Redis: ", err)
                -- Плануємо наступну спробу, навіть якщо Redis впав
                ngx.timer.at(delay, fetch_weights_from_redis)
                return
            end

            -- Читаємо список живих серверів (наш Service Discovery)
            local active_ips, err = red:smembers("active_backends")
            if not active_ips or active_ips == ngx.null or #active_ips == 0 then
                ngx.log(ngx.WARN, "No active backends found in Redis")
                red:set_keepalive(10000, 100)
                ngx.timer.at(delay, fetch_weights_from_redis)
                return
            end

            -- Отримуємо доступ до локального кешу Nginx
            local state = ngx.shared.balancer_state

            -- Зберігаємо список IP у вигляді рядка, розділеного комами (для швидкості)
            local ips_str = table.concat(active_ips, ",")
            state:set("active_backends", ips_str)

            -- Читаємо ваги для кожного живого IP і кешуємо їх локально
            for i, ip in ipairs(active_ips) do
                local weight, err = red:get("weight_" .. ip)
                if weight and weight ~= ngx.null then
                    -- Зберігаємо вагу у пам'яті Nginx
                    state:set("weight_" .. ip, tonumber(weight))
                else
                    -- Якщо Python ще не порахував вагу, ставимо дефолтну 1
                    state:set("weight_" .. ip, 1)
                end
            end

            -- Повертаємо з'єднання в пул (оптимізація Redis)
            red:set_keepalive(10000, 100)

            -- Запускаємо таймер на наступну секунду (нескінченний цикл)
            local ok, err = ngx.timer.at(delay, fetch_weights_from_redis)
            if not ok then
                ngx.log(ngx.ERR, "Failed to create timer: ", err)
            end
        end

        -- Запускаємо наш фоновий процес одразу при старті Nginx
        local ok, err = ngx.timer.at(0, fetch_weights_from_redis)
        if not ok then
            ngx.log(ngx.ERR, "Failed to start background worker: ", err)
        end
    }

    # =========================================================================
    # 3. Динамічний Upstream (Data Plane)
    # Тут відбувається магія балансування "на льоту".
    # =========================================================================
    upstream dynamic_pool {
        # Фіктивний сервер. Nginx вимагає хоча б один 'server' для синтаксису,
        # але наш Lua-скрипт завжди буде переписувати ціль (target).
        server 0.0.0.1:80;

        balancer_by_lua_block {
            local balancer = require "ngx.balancer"
            local state = ngx.shared.balancer_state

            -- 1. Читаємо актуальний список бекендів з пам'яті
            local active_backends_str = state:get("active_backends")

            if not active_backends_str then
                ngx.log(ngx.ERR, "No backends available in shared dict")
                return ngx.exit(502) -- Bad Gateway, якщо немає живих вузлів
            end

            -- 2. Розбиваємо рядок на масив (split by comma)
            local active_ips = {}
            for ip in string.gmatch(active_backends_str, "([^,]+)") do
                table.insert(active_ips, ip)
            end

            -- 3. Алгоритм Weighted Random Selection (Зважений випадковий вибір)
            local total_weight = 0
            local weights = {}

            -- Збираємо ваги всіх доступних серверів
            for i, ip in ipairs(active_ips) do
                local w = state:get("weight_" .. ip) or 1
                table.insert(weights, w)
                total_weight = total_weight + w
            end

            -- Якщо всі сервери мертві/штрафовані і total_weight = 0
            if total_weight == 0 then
                ngx.log(ngx.ERR, "Total weight is zero. Overloaded!")
                return ngx.exit(503) -- Service Unavailable
            end

            -- Вибираємо випадкове число від 1 до загальної суми ваг
            math.randomseed(ngx.now() * 1000)
            local random_choice = math.random(1, total_weight)

            local selected_ip = nil
            local current_sum = 0

            -- Шукаємо, в який "проміжок" потрапило наше випадкове число
            for i, w in ipairs(weights) do
                current_sum = current_sum + w
                if random_choice <= current_sum then
                    selected_ip = active_ips[i]
                    break
                end
            end

            -- 4. Встановлюємо цільовий сервер для цього запиту!
            -- Наш FastAPI працює на порту 8000
            local ok, err = balancer.set_current_peer(selected_ip, 8000)
            if not ok then
                ngx.log(ngx.ERR, "Failed to set peer: ", err)
                return ngx.exit(500)
            end
        }
    }

    # =========================================================================
    # 4. Основний Server Block
    # Приймає запити від Locust / Користувачів
    # =========================================================================
    server {
        listen 80;
        server_name localhost;

        location / {
            # Відправляємо трафік у наш динамічний Lua-балансувальник
            proxy_pass http://dynamic_pool;

            # Стандартні заголовки для проксі
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Таймаути (якщо бекенд завис на 3 секунди, відкидаємо його)
            proxy_connect_timeout 3s;
            proxy_send_timeout 3s;
            proxy_read_timeout 3s;
        }

        # Опціонально: Ендпоінт для перевірки стану самого Nginx
        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }
}