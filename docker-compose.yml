# ==============================================================================
# Інфраструктурна специфікація (Infrastructure as Code)
# Проєкт: Адаптивне балансування навантаження для розподілених веб-застосунків.
# ==============================================================================

# Використовується версія 3.8 специфікації Compose, яка підтримує 
# розширені параметри розгортання (deploy) та конфігурацію ресурсів.
version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # КОМПОНЕНТ 1: State Store (Сховище стану)
  # Роль: In-Memory база даних для зберігання актуальних ваг серверів та конфігів.
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis_store
    ports:
      - "6379:6379" # Експорт порту для можливості зовнішнього адміністрування (redis-cli)
    networks:
      - shared_net
    restart: unless-stopped # Політика автоматичного відновлення сервісу після збоїв

  # ----------------------------------------------------------------------------
  # КОМПОНЕНТ 2: Data Plane (Маршрутизатор трафіку)
  # Роль: Reverse Proxy на базі OpenResty (Nginx + Lua) для динамічного балансування.
  # ----------------------------------------------------------------------------
  balancer:
    image: openresty/openresty:alpine
    container_name: openresty_balancer
    ports:
      - "80:80" # Вхідний інтерфейс (Ingress) для користувацького трафіку
    volumes:
      # Монтування файлу конфігурації. 
      # Прапорець 'ro' (Read-Only) захищає вихідний файл на хості від модифікацій.
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - redis # Гарантує ініціалізацію бази даних до запуску проксі-сервера
    networks:
      - shared_net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # КОМПОНЕНТ 3: Control Plane (Аналітичний модуль)
  # Роль: Асинхронний збір метрик, обчислення навантаження, запис у Redis.
  # ----------------------------------------------------------------------------
  worker:
    build:
      context: ./worker
    container_name: python_worker
    env_file:
      - .env # Глобальна ін'єкція змінних середовища 
    volumes:
      # IPC (Inter-Process Communication) через сокет.
      # Надає воркеру доступ до Docker API для динамічного виявлення вузлів.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    networks:
      - shared_net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # КОМПОНЕНТ 4: Backends (Вузли обробки)
  # Роль: Stateless-сервіси на базі FastAPI для обробки запитів.
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    deploy:
      # Конфігурація реплікації. 
      # Ініціює створення вказаної кількості незалежних інстансів сервісу.
      replicas: 3 
    env_file:
      - .env
    networks:
      - shared_net
    restart: unless-stopped
    # Порти не експортуються на рівень хост-машини для запобігання конфліктам 
    # адресного простору між репліками. Трафік маршрутизується виключно 
    # через внутрішню мережу балансувальником.

  # ----------------------------------------------------------------------------
  # КОМПОНЕНТ 5: Load Generator (Симулятор трафіку)
  # Роль: Інструмент стрес-тестування (Locust) для генерації синтетичного навантаження.
  # ----------------------------------------------------------------------------
  locust:
    image: locustio/locust
    container_name: locust_generator
    ports:
      - "8089:8089" # Веб-інтерфейс моніторингу тестів
    environment:
      # Визначення цільової адреси для стрес-тестування
      - LOCUST_TARGET_HOST=http://balancer:80 
    volumes:
      - ./locust/locustfile.py:/mnt/locust/locustfile.py:ro
    networks:
      - shared_net
    depends_on:
      - balancer

# ==============================================================================
# ТОПОЛОГІЯ МЕРЕЖ (Network Topology)
# ==============================================================================
networks:
  shared_net:
    # Тип драйвера 'bridge' створює ізольовану віртуальну підмережу L2 на рівні 
    # хост-машини, забезпечуючи DNS-резолвінг імен контейнерів.
    driver: bridge